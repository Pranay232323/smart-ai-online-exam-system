<!DOCTYPE html>
<html>

<head>
<title>AI Question Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
}

.box{
width:400px;
margin:auto;
padding:30px;
border:1px solid #ccc;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:8px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<h1>AI Question Generator</h1>

<div class="box">

<form action="/generate-questions" method="POST">

<label>Topic</label>
<input type="text" name="topic" placeholder="Example: JavaScript">

<br><br>

<label>Difficulty</label>
<select name="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<br><br>

<label>Number of Questions</label>
<input type="number" name="count" value="5">

<br>

<button type="submit">Generate Questions</button>

</form>

</div>

<br>

<a href="/admin-dashboard">Back to Admin Dashboard</a>

</body>
</html>
