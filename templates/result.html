<!DOCTYPE html>
<html>
<head>

<title>Exam Result</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

.result-box{
border:1px solid #ccc;
padding:40px;
width:400px;
margin:auto;
border-radius:10px;
}

h1{
color:#4CAF50;
}

</style>

</head>

<body>

<div class="result-box">

<h1>Exam Result</h1>

<h2>Score: {{ score }} / {{ total }}</h2>

<h3>Percentage: {{ percentage }}%</h3>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

<script>

history.pushState(null, null, location.href);

window.onpopstate = function () {

history.go(1);

};

</script>

</body>
</html>
