<!DOCTYPE html>
<html>
<head>
<title>Exam</title>

<style>
body{font-family:Arial;}

#palette span{
margin:6px;
cursor:pointer;
font-weight:bold;
font-size:18px;
}

button{
padding:8px 16px;
margin:10px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{background:#45a049;}

#warningBox{
position:fixed;
top:20px;
right:20px;
background:#ff4444;
color:white;
padding:15px;
border-radius:8px;
display:none;
z-index:1000;
}

#popupOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

#popupBox{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<h2>Online Exam</h2>

<h3>Time Remaining: <span id="timer">30:00</span></h3>

<h4 id="answerCount">Answered: 0</h4>

<div id="question-box"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>

<br><br>

<div id="palette"></div>

<br>

<button onclick="showPopup()">Submit Exam</button>

<form id="examForm" action="/submit-exam" method="POST"></form>

<div id="warningBox"></div>

<div id="popupOverlay">
<div id="popupBox">
<h3>Submit Exam?</h3>
<p>Are you sure you want to submit?</p>
<button onclick="submitExam()">Yes Submit</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<h4>Legend</h4>
<p style="color:green">● Answered</p>
<p style="color:orange">● Visited but unanswered</p>
<p style="color:black">● Not visited</p>

<script>

let questions = {{ questions | tojson }};
let currentQuestion = 0;

let answers = {};
let visited = {};

let examSubmitting=false;

/* ---------------- QUESTION LOAD ---------------- */

function loadQuestion(){

visited[currentQuestion]=true;

let q = questions[currentQuestion];

let html="<h3>Question "+(currentQuestion+1)+" / "+questions.length+"</h3>";

html+="<p>"+q[2]+"</p>";

html+=`<input type="radio" name="opt" value="A" onclick="saveAnswer('A')"> ${q[3]}<br>`;
html+=`<input type="radio" name="opt" value="B" onclick="saveAnswer('B')"> ${q[4]}<br>`;
html+=`<input type="radio" name="opt" value="C" onclick="saveAnswer('C')"> ${q[5]}<br>`;
html+=`<input type="radio" name="opt" value="D" onclick="saveAnswer('D')"> ${q[6]}<br>`;

document.getElementById("question-box").innerHTML=html;

let qid=q[0];

if(answers[qid]){

let radios=document.getElementsByName("opt");

for(let r of radios){

if(r.value===answers[qid]) r.checked=true;

}

}

updatePalette();
updateCounter();

}

/* ---------------- ANSWER SAVE ---------------- */

function saveAnswer(opt){

let qid=questions[currentQuestion][0];

answers[qid]=opt;

updateCounter();
updatePalette();

}

function updateCounter(){

document.getElementById("answerCount").innerText =
"Answered: "+Object.keys(answers).length+" / "+questions.length;

}

/* ---------------- NAVIGATION ---------------- */

function nextQuestion(){

if(currentQuestion<questions.length-1){

currentQuestion++;
loadQuestion();

}

}

function prevQuestion(){

if(currentQuestion>0){

currentQuestion--;
loadQuestion();

}

}

function jumpQuestion(i){

currentQuestion=i;
loadQuestion();

}

/* ---------------- PALETTE ---------------- */

function buildPalette(){

let html="<span onclick='prevQuestion()'><</span>";

for(let i=0;i<questions.length;i++){

html+=`<span id="p${i}" onclick="jumpQuestion(${i})">${i+1}</span>`;

}

html+="<span onclick='nextQuestion()'>></span>";

document.getElementById("palette").innerHTML=html;

}

function updatePalette(){

for(let i=0;i<questions.length;i++){

let el=document.getElementById("p"+i);

if(!el) continue;

let qid=questions[i][0];

if(answers[qid]){

el.style.color="green";

}
else if(visited[i]){

el.style.color="orange";

}
else{

el.style.color="black";

}

if(i===currentQuestion){

el.style.textDecoration="underline";

}

}

}

/* ---------------- SUBMIT ---------------- */

function showPopup(){

document.getElementById("popupOverlay").style.display="flex";

}

function closePopup(){

document.getElementById("popupOverlay").style.display="none";

}

function submitExam(auto=false){

examSubmitting=true;

let form=document.getElementById("examForm");

for(let qid in answers){

let input=document.createElement("input");

input.type="hidden";
input.name="q"+qid;
input.value=answers[qid];

form.appendChild(input);

}

form.submit();

}

/* ---------------- TIMER ---------------- */

let time=30*60;

function startTimer(){

setInterval(function(){

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText =
m+":"+(s<10?"0":"")+s;

time--;

if(time<=0){

submitExam(true);

}

},1000);

}

/* ---------------- TAB SWITCH ---------------- */

let violations=0;

document.addEventListener("visibilitychange",function(){

if(document.hidden && !examSubmitting){

violations++;

showWarning("Tab switching detected "+violations+"/2");

if(violations>=2){

submitExam(true);

}

}

});

/* ---------------- WARNING ---------------- */

function showWarning(txt){

let box=document.getElementById("warningBox");

box.innerText=txt;

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

/* ---------------- BLOCK RELOAD ---------------- */

document.addEventListener("keydown",function(e){

if(e.key==="F5" || (e.ctrlKey && e.key==="r")){

e.preventDefault();
showWarning("Reload disabled during exam");

}

});

/* ---------------- START PAGE ---------------- */

buildPalette();
loadQuestion();
startTimer();

</script>

</body>
</html>
