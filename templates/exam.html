<!DOCTYPE html>
<html>

<head>
<title>Exam</title>

<style>

body{
font-family:Arial;
}

#question-box{
margin-bottom:20px;
}

.palette{
margin-top:20px;
}

#palette{
margin-top:20px;
font-size:18px;
}

#palette span{
margin:5px;
cursor:pointer;
font-weight:bold;
}

#palette span:hover{
color:blue;
}

button{
padding:8px 16px;
margin:10px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#warningBox{
position:fixed;
top:20px;
right:20px;
background:#ff4444;
color:white;
padding:15px;
border-radius:8px;
display:none;
font-weight:bold;
z-index:1000;
}

</style>

</head>

<body>

<h2>Online Exam</h2>

<h3>Time Remaining: <span id="timer"></span></h3>

<h4 id="answer-count">Answered: 0</h4>

<div id="question-box"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>

<div class="palette" id="palette"></div>

<br>

<button onclick="submitExam()">Submit Exam</button>

<form id="examForm" action="/submit-exam" method="POST"></form>

<div id="warningBox"></div>

<div style="margin-top:10px">
<b>Legend:</b><br>
<span style="color:green">● Answered</span><br>
<span style="color:orange">● Visited but unanswered</span><br>
<span style="color:black">● Not visited</span>
</div>

<script>

let examSubmitting=false;

let questions={{ questions | tojson }};
let currentQuestion=0;

let answers={};
let visitedQuestions={};

function loadQuestion(){

visitedQuestions[currentQuestion]=true;

let q=questions[currentQuestion];

let html="<h3>Question "+(currentQuestion+1)+" / "+questions.length+"</h3>";

html+="<p>"+q[2]+"</p>";

html+=`<input type="radio" name="option" value="A" onclick="saveAnswer('A')"> ${q[3]} <br>`;
html+=`<input type="radio" name="option" value="B" onclick="saveAnswer('B')"> ${q[4]} <br>`;
html+=`<input type="radio" name="option" value="C" onclick="saveAnswer('C')"> ${q[5]} <br>`;
html+=`<input type="radio" name="option" value="D" onclick="saveAnswer('D')"> ${q[6]} <br>`;

document.getElementById("question-box").innerHTML=html;

let qid=questions[currentQuestion][0];

if(answers[qid]){

let radios=document.getElementsByName("option");

for(let r of radios){

if(r.value==answers[qid]){
r.checked=true;
}

}

}

updatePalette();
highlightCurrentQuestion();

}

function nextQuestion(){

if(currentQuestion<questions.length-1){
currentQuestion++;
loadQuestion();
}

}

function prevQuestion(){

if(currentQuestion>0){
currentQuestion--;
loadQuestion();
}

}

function saveAnswer(option){

let qid=questions[currentQuestion][0];

answers[qid]=option;

updatePalette();
updateAnswerCount();

}

function updateAnswerCount(){

let count=Object.keys(answers).length;

document.getElementById("answer-count").innerText =
"Answered: "+count+" / "+questions.length;

}

function buildPalette(){

let paletteHTML=`<span onclick="prevQuestion()">&#60;</span>`;

for(let i=0;i<questions.length;i++){

paletteHTML+=`<span onclick="jumpQuestion(${i})">${i+1}</span>`;

}

paletteHTML+=`<span onclick="nextQuestion()">&#62;</span>`;

document.getElementById("palette").innerHTML=paletteHTML;

}

function updatePalette(){

let spans=document.querySelectorAll("#palette span");

for(let i=0;i<questions.length;i++){

let qid=questions[i][0];

if(answers[qid]){
spans[i+1].style.color="green";
}
else if(visitedQuestions[i]){
spans[i+1].style.color="orange";
}
else{
spans[i+1].style.color="black";
}

}

}

function highlightCurrentQuestion(){

let spans=document.querySelectorAll("#palette span");

spans.forEach(s=>s.style.textDecoration="none");

spans[currentQuestion+1].style.textDecoration="underline";

}

function jumpQuestion(index){

currentQuestion=index;

loadQuestion();

}

function submitExam(force=false){

if(!force){

if(!confirm("Are you sure you want to submit the exam?")){
return;
}

}

examSubmitting=true;

let form=document.getElementById("examForm");

for(let qid in answers){

let input=document.createElement("input");

input.type="hidden";
input.name="q"+qid;
input.value=answers[qid];

form.appendChild(input);

}

form.submit();

}

loadQuestion();
buildPalette();

</script>

<script>

let time=60*30;

let timer=setInterval(function(){

let minutes=Math.floor(time/60);
let seconds=time%60;

document.getElementById("timer").innerHTML=
minutes+":"+(seconds<10?"0":"")+seconds;

time--;

if(time<0){

clearInterval(timer);

showWarning("Time is up! Submitting exam...");

submitExam(true);

}

},1000);

</script>

<script>

function showWarning(text){

let box=document.getElementById("warningBox");

box.innerHTML=text;

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

</script>

<script>

let violations=0;

function handleViolation(){

if(examSubmitting)return;

violations++;

showWarning("Warning "+violations+"/2 : Tab switching detected");

if(violations>=2){

showWarning("Too many violations. Submitting exam...");

setTimeout(()=>{
submitExam(true);
},2000);

}

}

document.addEventListener("visibilitychange",function(){

if(document.hidden){
handleViolation();
}

});

window.addEventListener("blur",function(){

handleViolation();

});

</script>

<script>

/* Prevent refresh */

window.addEventListener("beforeunload",function(e){

if(!examSubmitting){

e.preventDefault();
e.returnValue="Exam in progress. Leaving will submit the exam.";

}

});

/* Disable back button */

history.pushState(null,null,location.href);

window.onpopstate=function(){

history.go(1);

};

</script>

</body>
</html>
