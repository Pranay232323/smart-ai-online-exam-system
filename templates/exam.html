<!DOCTYPE html>
<html>
<head>
<title>Exam</title>
</head>

<body>

<h2>Exam Questions</h2>

<h3>Time Remaining: <span id="timer"></span></h3>

<form action="/submit-exam" method="POST">

{% if questions %}

{% for q in questions %}

<p><b>{{ q[2] }}</b></p>

<input type="radio" name="q{{ q[0] }}" value="A"> {{ q[3] }} <br>
<input type="radio" name="q{{ q[0] }}" value="B"> {{ q[4] }} <br>
<input type="radio" name="q{{ q[0] }}" value="C"> {{ q[5] }} <br>
<input type="radio" name="q{{ q[0] }}" value="D"> {{ q[6] }} <br>

<hr>

{% endfor %}

{% else %}

<p>No questions available for this exam.</p>

{% endif %}

<button type="submit">Submit Exam</button>

</form>


<script>
let time = 60 * 30; // 30 minutes

let timer = setInterval(function(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    time--;

    if(time < 0){
        clearInterval(timer);
        alert("Time is up! Exam will be submitted.");
        document.querySelector("form").submit();
    }

},1000);
</script>

</body>
</html>
