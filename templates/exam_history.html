<!DOCTYPE html>
<html>

<head>

<title>Exam History</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/exam_history.css') }}">

</head>

<body>
<button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

<div class="history-box">

<h1>My Exam History</h1>

<table>

<tr>
<th>Exam</th>
<th>Score</th>
<th>Percentage</th>
</tr>

{% for h in history %}

<tr>

<td>{{ h[0] }}</td>

<td>{{ h[1] }} / {{ h[2] }}</td>

<td>{{ ((h[1]/h[2])*100)|round(2) }}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</html>
