<!DOCTYPE html>
<html>

<head>

<title>Exam History</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.history-box{
background:white;
padding:40px;
width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
}

th{
background:#4CAF50;
color:white;
}

</style>

</head>

<body>

<div class="history-box">

<h1>My Exam History</h1>

<table>

<tr>
<th>Exam</th>
<th>Score</th>
<th>Percentage</th>
</tr>

{% for h in history %}

<tr>

<td>{{ h[0] }}</td>

<td>{{ h[1] }} / {{ h[2] }}</td>

<td>{{ ((h[1]/h[2])*100)|round(2) }}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>

</html>
