<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body>
    <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

    <main class="form-card">
        <div class="top-nav">
            <div>
                <h1 class="page-title">Add Question</h1>
                <p class="page-subtitle">Create a multiple-choice question and attach it to one of your exams.</p>
            </div>
            <div class="top-nav-links">
                <a class="secondary-action" href="/manage-exams">Manage Exams</a>
                <a class="secondary-action" href="/admin-dashboard">Back to Admin</a>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-stack">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form action="/save-question" method="POST" class="form-grid">
            <div>
                <label for="exam_id">Select Exam</label>
                <select id="exam_id" name="exam_id" required>
                    <option value="">Choose an exam</option>
                    {% for exam in exams %}
                    <option value="{{ exam.id }}">{{ exam.title }} (ID {{ exam.id }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="question">Question</label>
                <textarea id="question" name="question" required></textarea>
            </div>

            <div>
                <label for="option_a">Option A</label>
                <input id="option_a" type="text" name="option_a" required>
            </div>

            <div>
                <label for="option_b">Option B</label>
                <input id="option_b" type="text" name="option_b" required>
            </div>

            <div>
                <label for="option_c">Option C</label>
                <input id="option_c" type="text" name="option_c" required>
            </div>

            <div>
                <label for="option_d">Option D</label>
                <input id="option_d" type="text" name="option_d" required>
            </div>

            <div>
                <label for="correct_answer">Correct Answer</label>
                <select id="correct_answer" name="correct_answer" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="toolbar-row">
                <button type="submit" class="primary-action">Save Question</button>
                <a class="secondary-action" href="/manage-exams">Done</a>
            </div>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>

</html>
