<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body>
    <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

    <main class="form-card">
        <h1 class="page-title">Add Question</h1>
        <p class="page-subtitle">Create a multiple-choice question and assign it to an exam.</p>

        <form action="/save-question" method="POST" class="form-grid">
            <div>
                <label for="exam_id">Exam ID</label>
                <input id="exam_id" type="number" name="exam_id" min="1" required>
            </div>

            <div>
                <label for="question">Question</label>
                <textarea id="question" name="question" required></textarea>
            </div>

            <div>
                <label for="option_a">Option A</label>
                <input id="option_a" type="text" name="option_a" required>
            </div>

            <div>
                <label for="option_b">Option B</label>
                <input id="option_b" type="text" name="option_b" required>
            </div>

            <div>
                <label for="option_c">Option C</label>
                <input id="option_c" type="text" name="option_c" required>
            </div>

            <div>
                <label for="option_d">Option D</label>
                <input id="option_d" type="text" name="option_d" required>
            </div>

            <div>
                <label for="correct_answer">Correct Answer (A/B/C/D)</label>
                <input id="correct_answer" type="text" name="correct_answer" maxlength="1" required>
            </div>

            <div class="toolbar-row">
                <button type="submit" class="primary-action">Add Question</button>
                <a class="secondary-action" href="/admin-dashboard">Back</a>
            </div>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>

</html>
