<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/performance_chart.css') }}">
</head>

<body>
    <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

    <main class="page-frame">
        <section class="page-card">
            <div class="top-nav">
                <div>
                    <h1 class="page-title">Student Performance Chart</h1>
                    <p class="page-subtitle">Average student percentage across completed exams.</p>
                </div>
                <div class="top-nav-links">
                    <a class="secondary-action" href="/admin-analytics">Analytics</a>
                    <a class="secondary-action" href="/admin-dashboard">Back to Admin</a>
                </div>
            </div>

            <canvas id="myChart"></canvas>
        </section>
    </main>

    <div id="chart-data" data-names='{{ names|tojson }}' data-scores='{{ scores|tojson }}'></div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/performance_chart.js') }}"></script>
</body>

</html>
