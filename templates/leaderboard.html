<!DOCTYPE html>
<html>

<head>

<title>Leaderboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:60px;
}

.board{
background:white;
padding:40px;
width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
}

th{
background:#4CAF50;
color:white;
}

.rank{
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<div class="board">

<h1>Leaderboard</h1>

<table>

<tr>
<th>Rank</th>
<th>Student</th>
<th>Exam</th>
<th>Score</th>
<th>Percentage</th>
</tr>

{% for row in leaderboard %}

<tr>

<td class="rank">{{ loop.index }}</td>

<td>{{ row[0] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[1] }} / {{ row[2] }}</td>

<td>{{ ((row[1]/row[2])*100)|round(2) }}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>

</html>
