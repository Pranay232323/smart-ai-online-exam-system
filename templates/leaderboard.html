<!DOCTYPE html>
<html>

<head>

<title>Leaderboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/leaderboard.css') }}">

</head>

<body>
<button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

<div class="board">

<h1>Leaderboard</h1>

<table>

<tr>
<th>Rank</th>
<th>Student</th>
<th>Exam</th>
<th>Score</th>
<th>Percentage</th>
</tr>

{% for row in leaderboard %}

<tr>

<td class="rank">{{ loop.index }}</td>

<td>{{ row[0] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[1] }} / {{ row[2] }}</td>

<td>{{ ((row[1]/row[2])*100)|round(2) }}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</html>
