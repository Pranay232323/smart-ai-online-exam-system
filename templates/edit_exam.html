<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body>
    <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

    <main class="form-card">
        <div class="top-nav">
            <div>
                <h1 class="page-title">Edit Exam</h1>
                <p class="page-subtitle">Update the title, schedule, and availability for this exam.</p>
            </div>
            <div class="top-nav-links">
                <a class="secondary-action" href="/manage-exams">Manage Exams</a>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-stack">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form action="/update-exam/{{ exam.id }}" method="POST" class="form-grid">
            <div>
                <label for="title">Exam Title</label>
                <input id="title" type="text" name="title" value="{{ exam.title }}" required>
            </div>

            <div>
                <label for="description">Description</label>
                <textarea id="description" name="description">{{ exam.description }}</textarea>
            </div>

            <div>
                <label for="duration">Duration (minutes)</label>
                <input id="duration" type="number" name="duration" min="1" value="{{ exam.duration }}" required>
            </div>

            <div>
                <label for="start_time">Start Time</label>
                <input id="start_time" type="datetime-local" name="start_time" value="{{ exam.start_time|datetime_local }}">
            </div>

            <div>
                <label for="end_time">End Time</label>
                <input id="end_time" type="datetime-local" name="end_time" value="{{ exam.end_time|datetime_local }}">
            </div>

            <label class="checkbox-row">
                <input type="checkbox" name="is_active" {% if exam.is_active %}checked{% endif %}>
                <span>Exam is active</span>
            </label>

            <div class="toolbar-row">
                <button type="submit" class="primary-action">Save Changes</button>
                <a class="secondary-action" href="/manage-exams">Cancel</a>
            </div>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>

</html>
