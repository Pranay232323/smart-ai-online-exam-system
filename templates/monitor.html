<!DOCTYPE html>
<html>

<head>
    <title>Exam Monitoring</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            margin-top: 50px;
        }

        .box {
            width: 80%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #0f766e;
            color: white;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Exam Monitoring</h1>

        {% if activity %}
        <table>
            <tr>
                <th>Student</th>
                <th>Exam</th>
                <th>Status</th>
                <th>Warnings</th>
            </tr>
            {% for row in activity %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No exam activity found yet.</p>
        {% endif %}

        <br>
        <a href="/admin-dashboard">Back to Admin Panel</a>
    </div>
</body>

</html>
