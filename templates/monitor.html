<!DOCTYPE html>
<html>

<head>
    <title>Exam Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/monitor.css') }}">
</head>

<body>
    <div class="box">
        <h1>Exam Monitoring</h1>

        {% if activity %}
        <table>
            <tr>
                <th>Student</th>
                <th>Exam</th>
                <th>Status</th>
                <th>Warnings</th>
            </tr>
            {% for row in activity %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No exam activity found yet.</p>
        {% endif %}

        <br>
        <a href="/admin-dashboard">Back to Admin Panel</a>
    </div>
</body>

</html>
